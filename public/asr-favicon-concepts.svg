<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none">
  <rect width="1200" height="360" fill="#121316"/>

  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <linearGradient id="lavenderFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2e6ff"/>
      <stop offset=".55" stop-color="#cfacd9"/>
      <stop offset="1" stop-color="#9f789b"/>
    </linearGradient>
    <linearGradient id="cyanFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f7ff"/>
      <stop offset=".55" stop-color="#74d7ff"/>
      <stop offset="1" stop-color="#2fa6d7"/>
    </linearGradient>
    <linearGradient id="violetFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd8ff"/>
      <stop offset=".55" stop-color="#cc8cff"/>
      <stop offset="1" stop-color="#8734d7"/>
    </linearGradient>
    <linearGradient id="goldBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff88a"/>
      <stop offset=".55" stop-color="#ffd83d"/>
      <stop offset="1" stop-color="#f0b400"/>
    </linearGradient>
    <symbol id="bolt" viewBox="0 0 24 34">
      <path d="M13.5 0L1.6 18.8h8.2L7.4 34 22.4 13.9h-8.8L13.5 0Z" fill="url(#goldBolt)" stroke="#fbf3a0" stroke-width="1.2" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <g transform="translate(36 34)" filter="url(#cardShadow)">
    <rect width="255" height="286" rx="22" fill="#1a1c21" stroke="#2d3138"/>
    <rect x="71" y="42" width="112" height="112" rx="12" fill="#050507" stroke="#676b72"/>
    <text x="95" y="126" fill="url(#lavenderFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="56" font-style="italic" font-weight="900">A</text>
    <text x="125" y="126" fill="url(#lavenderFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="56" font-style="italic" font-weight="900">S</text>
    <use href="#bolt" x="138" y="60" width="33" height="47"/>
    <text x="127.5" y="204" fill="#f3f5f7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" text-anchor="middle">AS + Bolt</text>
    <text x="127.5" y="233" fill="#9ca2ab" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">closest to David's icon</text>
  </g>

  <g transform="translate(327 34)" filter="url(#cardShadow)">
    <rect width="255" height="286" rx="22" fill="#1a1c21" stroke="#2d3138"/>
    <rect x="71" y="42" width="112" height="112" rx="12" fill="#050507" stroke="#676b72"/>
    <text x="84" y="126" fill="url(#lavenderFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-style="italic" font-weight="900">A</text>
    <text x="117" y="126" fill="url(#lavenderFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-style="italic" font-weight="900">S</text>
    <text x="149" y="126" fill="url(#cyanFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-style="italic" font-weight="900">R</text>
    <use href="#bolt" x="135" y="56" width="29" height="41"/>
    <text x="127.5" y="204" fill="#f3f5f7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" text-anchor="middle">ASR Cyan R</text>
    <text x="127.5" y="233" fill="#9ca2ab" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">same style, one cooler accent</text>
  </g>

  <g transform="translate(618 34)" filter="url(#cardShadow)">
    <rect width="255" height="286" rx="22" fill="#1a1c21" stroke="#2d3138"/>
    <rect x="71" y="42" width="112" height="112" rx="12" fill="#050507" stroke="#676b72"/>
    <text x="83" y="125" fill="url(#violetFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="54" font-style="italic" font-weight="900">A</text>
    <text x="116" y="125" fill="url(#violetFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="54" font-style="italic" font-weight="900">S</text>
    <use href="#bolt" x="142" y="58" width="31" height="45"/>
    <path d="M148 125h21" stroke="#63d6ff" stroke-width="4.2" stroke-linecap="round"/>
    <text x="127.5" y="204" fill="#f3f5f7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" text-anchor="middle">ASR Bar</text>
    <text x="127.5" y="233" fill="#9ca2ab" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">subtle reimagined blue touch</text>
  </g>

  <g transform="translate(909 34)" filter="url(#cardShadow)">
    <rect width="255" height="286" rx="22" fill="#1a1c21" stroke="#2d3138"/>
    <rect x="71" y="42" width="112" height="112" rx="12" fill="#050507" stroke="#676b72"/>
    <text x="86" y="126" fill="url(#lavenderFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="54" font-style="italic" font-weight="900">A</text>
    <text x="120" y="126" fill="url(#cyanFill)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="54" font-style="italic" font-weight="900">R</text>
    <use href="#bolt" x="131" y="57" width="30" height="44"/>
    <text x="127.5" y="204" fill="#f3f5f7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" text-anchor="middle">AR + Bolt</text>
    <text x="127.5" y="233" fill="#9ca2ab" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">cleaner letters, same vibe</text>
  </g>
</svg>
